<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin - ISOV 2026</title>
    <style>
        :root {
            --primary-red: #c61225;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #c61225 0%, #8b0d1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 45px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .login-logo img {
            width: 90px;
            height: 90px;
            margin-bottom: 15px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .login-logo h2 {
            color: var(--primary-red);
            margin: 0;
            font-size: 26px;
            font-weight: 900;
        }
        
        .login-logo p {
            color: #666;
            margin: 8px 0 0 0;
            font-size: 13px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #ebebeb;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            transition: border 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-red);
        }
        
        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary-red);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            background: #a00f1f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(198, 18, 37, 0.3);
        }
        
        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-msg {
            color: var(--primary-red);
            font-size: 13px;
            margin-top: 15px;
            text-align: center;
            display: none;
            font-weight: 700;
            background: #ffe5e8;
            padding: 10px;
            border-radius: 15px;
        }
        
        .back-link {
            text-align: center;
            margin-top: 25px;
        }
        
        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.3s;
        }
        
        .back-link a:hover {
            color: var(--primary-red);
        }
        
        @media (max-width: 768px) {
            .login-box {
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <img src="assets/images/anh_isov_standard2026.png" alt="Logo" onerror="this.style.display='none'">
                <h2>QUẢN TRỊ HỆ THỐNG</h2>
                <p>ISOV Korea Standard Spa 2026</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>👤 Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="Nhập tên đăng nhập" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>🔒 Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="btnLogin">ĐĂNG NHẬP</button>
                <div class="error-msg" id="errorMsg">❌ Sai tên đăng nhập hoặc mật khẩu!</div>
            </form>
            <div class="back-link">
                <a href="index.html">← Quay lại trang chủ</a>
            </div>
        </div>
    </div>
    <script src="config-public.js"></script>
    <script src="login.js"></script>
</body>
</body>
</html>
